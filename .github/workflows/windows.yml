name: "Windows"

on:
  workflow_call:
    inputs:
      build-id:
        description: 'Identifier for workflows and caching'
        type: string
        required: true
      cpm-cache-version:
        description: 'CPM Cache Version'
        type: string
        required: true
      devel:
        description: 'Development mode (disables update checker)'
        type: string
        required: true
      force_pgo:
        description: 'Force PGO builds'
        type: string
        required: true

env:
  DISABLE_ARM: ${{ vars.DISABLE_ARM }}
  SCCACHE_GHA_ENABLED: "true"
  CCACHE: "true"
  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
  DEVEL: ${{ inputs.devel }}
  BUILD_ID: ${{ inputs.build-id }}

jobs:
  set-matrix:
    name: "Generate Matrices"
    runs-on: ubuntu-latest
    outputs:
      msys: ${{ steps.msys.outputs.matrix }}
      msvc: ${{ steps.msvc.outputs.matrix }}
    steps:
      ## MSYS2 ##
      - id: msys
        run: |
          # Currently uses MINGW64. Could try clang64 or ucrt64,
          # but not viable right now.

          arch() {
            cat <<-EOF
            "runs-on": "$1", "arch": "$2", "msystem": "$3"
            EOF
          }

          AMD64="$(arch windows-latest amd64 MINGW64)"
          LEGACY="$(arch windows-latest legacy MINGW64)"
          ALLY="$(arch windows-latest rog-ally MINGW64)"
          ARM64="$(arch windows-11-arm arm64 CLANGARM64)"

          PGO='"program": "clang", "target": "pgo"'
          CLANG='"program": "clang", "target": "standard"'
          GCC='"program": "gcc", "target": "standard"'

          target() {
            arch="$1"
            compiler="$2"

            echo "{${arch}, ${compiler}}"
          }

          # TODO(crueter): dedupe in some way
          # TODO(crueter): Probably don't need legacy?
          amd_gcc="$(target "$AMD64" "$GCC")"
          amd_pgo="$(target "$AMD64" "$PGO")"
          legacy_gcc="$(target "$LEGACY" "$GCC")"
          legacy_pgo="$(target "$LEGACY" "$PGO")"
          ally_gcc="$(target "$ALLY" "$GCC")"
          ally_pgo="$(target "$ALLY" "$PGO")"
          arm_clang="$(target "$ARM64" "$CLANG")"
          arm_pgo="$(target "$ARM64" "$PGO")"

          MATRIX="[${amd_gcc}, ${arm_clang}"
          if [ "${{ inputs.devel }}" != "true" ] || [ "${{ inputs.force_pgo }}" = "true" ]; then
            MATRIX="$MATRIX, ${amd_pgo}, ${ally_gcc}, ${ally_pgo}, ${arm_pgo}"
          fi

          MATRIX="$MATRIX]"

          echo $MATRIX
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

      # TODO(crueter): See if PGO does anything appreciable.
      - id: msvc
        run: |
          AMD64='"runs-on": "windows-latest", "arch": "amd64"'
          ARM64='"runs-on": "windows-11-arm", "arch": "arm64"'

          PGO='"program": "msvc", "target": "pgo"'
          CLANG='"program": "msvc", "target": "standard"'

          target() {
            arch="$1"
            compiler="$2"

            echo "{${arch}, ${compiler}}"
          }

          amd64_msvc="$(target "$AMD64" "$CLANG")"
          MATRIX="[${amd64_msvc}]"

          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  # TODO: setup
  msys:
    name: "${{ matrix.os.msystem }} ${{ matrix.os.arch }} ${{ matrix.os.program }} ${{ matrix.os.target }}"
    needs: [set-matrix]
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set-matrix.outputs.msys) }}

    env:
      TARGET: ${{ matrix.os.arch }}
      COMPILER: "${{ matrix.os.program }}"
      PGO_TARGET: "${{ matrix.os.target }}"
      ARCH: ${{ matrix.os.arch }}-${{ matrix.os.program }}-${{ matrix.os.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/workflows/setup
        with:
          key: MSYS2-${{ matrix.os.msystem }}-${{ matrix.os.arch }}-${{ matrix.os.program }}
          version: ${{ inputs.cpm-cache-version }}

      - name: Load payload environment
        shell: bash
        run: . ./.ci/fj/load-env.sh

      - name: Setup MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.os.msystem }}
          update: true
          install: >-
            git make autoconf libtool automake-wrapper patch jq
            pactoys ninja
          pacboy: >-
            qt6-tools:p qt6-translations:p qt6-svg:p

            7zip:p sccache:p cmake:p toolchain:p clang:p python-pip:p lld:p
            openssl:p boost:p fmt:p lz4:p nlohmann-json:p zlib:p zstd:p
            vulkan-memory-allocator:p vulkan-devel:p glslang:p
            enet:p opus:p mbedtls:p libusb:p unordered_dense:p

            jbigkit:p xz:p libdeflate:p bzip2:p lerc:p graphite2:p crt-git:p
            libwebp:p libtiff:p brotli:p

      - name: Configure
        shell: msys2 {0}
        run: ./.ci/common/configure.sh -DCCACHE_PATH=sccache
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Package
        shell: msys2 {0}
        run: ./.ci/windows/package.sh
        env:
          MSYS_TOOLCHAIN: ${{ matrix.os.msystem }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mingw-${{ env.ARCH }}
          archive: false
          path: artifacts/*


  # TODO: setup
  msvc:
    name: "MSVC ${{ matrix.os.arch }} ${{ matrix.os.target }}"
    needs: [set-matrix]
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set-matrix.outputs.msvc) }}

    env:
      TARGET: ${{ matrix.os.arch }}
      COMPILER: "${{ matrix.os.program }}"
      PGO_TARGET: "${{ matrix.os.target }}"
      ARCH: ${{ matrix.os.arch }}-${{ matrix.os.program }}-${{ matrix.os.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/workflows/setup
        with:
          key: MSVC-${{ matrix.os.msystem }}-${{ matrix.os.arch }}-${{ matrix.os.program }}
          version: ${{ inputs.cpm-cache-version }}

      - name: Load payload environment
        shell: bash
        run: . ./.ci/fj/load-env.sh

      - name: Set up MSVC
        uses: Eden-CI/msvc-dev-cmd@master
        with:
          arch: ${{ matrix.os.arch }}

      - name: Install Vulkan SDK
        shell: powershell
        run: ./.ci/windows/install-vulkan-sdk.ps1

      - name: Configure
        shell: bash
        run: |
          git config --global core.autocrlf off
          dos2unix .patch/boost/*
          ./.ci/common/configure.sh -DCCACHE_PATH=${SCCACHE_PATH}

      - name: Build
        shell: bash
        run: cmake --build build

      - name: Package
        shell: bash
        run: ./.ci/windows/package.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: msvc-${{ env.ARCH }}
          archive: false
          path: artifacts/*

